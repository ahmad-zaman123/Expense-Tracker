[tool.black]
line-length = 100
target-version = ["py311"]

[tool.isort]
profile = "black"
line_length = 100
known_first_party = ["apps", "config"]

[tool.coverage.run]
source = ["apps"]
omit = [
    "*/migrations/*",
    "*/tests.py",
    "*/apps.py",
    "manage.py",
]

[tool.coverage.report]
show_missing = true
skip_covered = true
